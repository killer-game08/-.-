<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — Учусь.РФ</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <div class="container">
      <a href="../../index.html" class="logo">
        <svg viewBox="0 0 24 24">
          <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z" />
        </svg>
        Учусь.РФ
      </a>
      <button class="mobile-btn" aria-label="Меню">
        <svg viewBox="0 0 24 24">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
        </svg>
      </button>
      <nav>
        <ul class="nav">
          <li><a href="../../index.html"><svg viewBox="0 0 24 24">
                <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59z" />
              </svg>Вход</a></li>
          <li><a href="register.html" class="active"><svg viewBox="0 0 24 24">
                <path
                  d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
              </svg>Регистрация</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-top">
        <svg viewBox="0 0 24 24">
          <path
            d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
        </svg>
        <h1>Создать аккаунт</h1>
        <p>Заполните все поля</p>
      </div>
      <form id="regForm">
        <div class="form-group">
          <label class="form-label" for="fio">ФИО полностью</label>
          <input type="text" id="fio" class="form-input" placeholder="Иванов Иван Иванович" required>
          <span class="form-hint">Как в паспорте</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="login">Логин</label>
          <input type="text" id="login" class="form-input" placeholder="ivanov2024" required>
          <span class="form-hint">От 6 символов, только латиница и цифры</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="pass">Пароль</label>
          <div class="pass-wrap">
            <input type="password" id="pass" class="form-input" placeholder="Минимум 8 символов" required>
            <button type="button" class="pass-toggle" tabindex="-1">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
              </svg>
            </button>
          </div>
          <span class="form-hint">Минимум 8 символов</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Телефон</label>
          <div class="phone-row">
            <span class="phone-prefix">+7</span>
            <input type="tel" id="phone" class="form-input" placeholder="(999) 123-45-67" required maxlength="18">
          </div>
          <span class="form-hint">Начните вводить цифры</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="ivan@mail.ru" required>
          <span class="form-hint">Для уведомлений</span>
        </div>
        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
      </form>
      <div class="auth-link">Уже есть аккаунт? <a href="../../index.html">Войти</a></div>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      phoneMask(document.getElementById('phone'));
      passToggle(document.querySelector('.pass-toggle'), document.getElementById('pass'));

      const loginInp = document.getElementById('login');
      loginInp.addEventListener('blur', () => { const r = V.login(loginInp.value.trim()); r.ok ? UI.ok(loginInp) : UI.err(loginInp, r.msg) });
      loginInp.addEventListener('input', () => UI.clear(loginInp));

      const passInp = document.getElementById('pass');
      passInp.addEventListener('blur', () => { const r = V.pass(passInp.value); r.ok ? UI.ok(passInp) : UI.err(passInp, r.msg) });
      passInp.addEventListener('input', () => UI.clear(passInp));

      const emailInp = document.getElementById('email');
      emailInp.addEventListener('blur', () => { const r = V.email(emailInp.value.trim()); r.ok ? UI.ok(emailInp) : UI.err(emailInp, r.msg) });
      emailInp.addEventListener('input', () => UI.clear(emailInp));

      const phoneInp = document.getElementById('phone');
      phoneInp.addEventListener('blur', () => { const r = V.phone(phoneInp.value.trim()); r.ok ? UI.ok(phoneInp) : UI.err(phoneInp, r.msg) });

      document.getElementById('regForm').addEventListener('submit', function (e) {
        e.preventDefault(); UI.clearForm(this);
        const fio = document.getElementById('fio').value.trim();
        const login = document.getElementById('login').value.trim();
        const pass = document.getElementById('pass').value;
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        let err = false;
        if (!V.req(fio).ok) { UI.err(document.getElementById('fio'), 'Введите ФИО'); err = true }
        const vl = V.login(login); if (!vl.ok) { UI.err(document.getElementById('login'), vl.msg); err = true }
        const vp = V.pass(pass); if (!vp.ok) { UI.err(document.getElementById('pass'), vp.msg); err = true }
        const vph = V.phone(phone); if (!vph.ok) { UI.err(document.getElementById('phone'), vph.msg); err = true }
        const ve = V.email(email); if (!ve.ok) { UI.err(document.getElementById('email'), ve.msg); err = true }
        if (err) return;
        const res = Auth.reg({ fullName: fio, login, password: pass, phone, email });
        if (res.ok) { UI.toast(res.msg, 'success'); setTimeout(() => location.href = '../../index.html', 1200) }
        else UI.toast(res.msg, 'error');
      });
    });
  </script>
</body>

</html>

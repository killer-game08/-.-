<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Учусь.РФ</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <div class="container">
      <a href="../../index.html" class="logo">
        <svg viewBox="0 0 24 24">
          <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z" />
        </svg>
        Учусь.РФ
      </a>
      <button class="mobile-btn" aria-label="Меню">
        <svg viewBox="0 0 24 24">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
        </svg>
      </button>
      <nav>
        <ul class="nav">
          <li><a href="../../index.html"><svg viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
              </svg>Выход</a></li>
          <li><a href="login.html" class="active"><svg viewBox="0 0 24 24">
                <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59z" />
              </svg>Вход</a></li>
          <li><a href="register.html"><svg viewBox="0 0 24 24">
                <path
                  d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
              </svg>Регистрация</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-top">
        <svg viewBox="0 0 24 24">
          <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59z" />
        </svg>
        <h1>Вход в систему</h1>
        <p>Введите логин и пароль, чтобы продолжить</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="login">Логин</label>
          <input type="text" id="login" class="form-input" placeholder="Ваш логин" required>
          <span class="form-hint"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="pass">Пароль</label>
          <div class="pass-wrap">
            <input type="password" id="pass" class="form-input" placeholder="Ваш пароль" required>
            <button type="button" class="pass-toggle" tabindex="-1">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
              </svg>
            </button>
          </div>
          <span class="form-hint"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Войти</button>
      </form>
      <div class="auth-link">Ещё не зарегистрированы? <a href="register.html">Регистрация</a></div>
      <hr style="border:none;border-top:1px solid var(--gray-light);margin:24px 0">
      <div class="text-center">
        <p class="helper" style="margin-bottom:12px">Вход для администратора</p>
        <button id="adminBtn" class="btn btn-secondary btn-sm">Войти как администратор</button>
      </div>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      passToggle(document.querySelector('.pass-toggle'), document.getElementById('pass'));

      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault(); UI.clearForm(this);
        const l = document.getElementById('login').value.trim();
        const p = document.getElementById('pass').value;
        if (!l || !p) { UI.toast('Введите логин и пароль', 'warning'); return }
        const res = Auth.login(l, p);
        if (res.ok) { UI.toast('Вход выполнен!', 'success'); setTimeout(() => location.href = 'profile.html', 800) }
        else { UI.toast(res.msg, 'error'); }
      });

      document.getElementById('adminBtn').addEventListener('click', () => {
        const l = prompt('Логин администратора:'); if (!l) return;
        const p = prompt('Пароль администратора:'); if (!p) return;
        const res = Auth.admin(l, p);
        if (res.ok) { UI.toast('Вход выполнен!', 'success'); setTimeout(() => location.href = 'admin.html', 800) }
        else { UI.toast(res.msg, 'error'); }
      });
    });
  </script>
</body>

</html>
